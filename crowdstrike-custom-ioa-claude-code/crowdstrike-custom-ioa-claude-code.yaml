        \ disposition, host/user, repeat timestamps, hashes (MD5 and SHA256). Use\
        \ inline code for all technical values.\nDo NOT return JSON. Do NOT use code\
        \ blocks for the whole message. Use inline code backticks for technical values\
        \ only. Write in a professional SOC analyst tone - factual, evidence-based,\
        \ no speculation."
