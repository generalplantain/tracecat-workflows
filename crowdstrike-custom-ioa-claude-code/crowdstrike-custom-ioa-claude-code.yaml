        \ formatting):\nStart with an emoji + italic title line summarizing what happened,\
        \ the user, and the host. Then \"Verdict: VERDICT_HERE\" with an appropriate\
        \ emoji.\nUse horizontal rules (\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
        \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500) between sections.\n\
        Section: *What happened* Write 3-5 sentences. Use inline code backticks for\
        \ technical values like command lines, paths, hostnames, usernames. Mention\
        \ the process chain (grandparent -> parent -> process). Note if there were\
        \ repeated attempts and their timestamps.\nSection: *Why this matters (or\
        \ doesn't)* Explain what the flag does. Assess whether this looks user-initiated\
        \ vs automated/malicious based on the process tree. Note the binary path legitimacy\
        \ and that the event was prevented. Assess immediate impact.\nSection: *What\
        \ to do* Numbered list of 3-5 specific actions. Reference the actual username,\
        \ AID, SHA256, timestamps from telemetry. Include: contact user for explanation,\
        \ pivot on AID in Falcon for all related detections, verify binary legitimacy,\
        \ escalation criteria.\nSection: *Follow-up investigation steps* For each\
        \ investigation avenue provide: - Where to look (e.g. \"Falcon Event Search\
        \ (Process/Runnable events)\") - The actual query to run in inline code -\
        \ Bullet: \"Look for:\" what to search for - Bullet: \"What it means:\" how\
        \ to interpret results\nInclude at minimum: process history search, process\
        \ tree pivot around detection time, file/hash lookup.\nSection: *Key evidence*\
